networks:
  payment_net:

services:
  payment_db:
    image: postgres:16.0
    ports:
      - "5433:5433"
    volumes:
    # При отладке отдельно можно использовать готовый бекап.
      # - ./db_data:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./src/.env
    networks:
      - payment_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    env_file:
      - ./src/.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - payment_net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  rabbitmq_data: