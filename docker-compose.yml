networks:
  payment_net:

services:
  payment_db:
    image: postgres:16.0
    ports:
      - "5433:5432"
    volumes:
    # При отладке отдельно можно использовать готовый бекап.
      # - ./db_data:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./src/.env
    networks:
      - payment_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data: