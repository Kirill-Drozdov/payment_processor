networks:
  payment_net:

services:
  payment_db:
    image: postgres:16.0
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./src/.env
    networks:
      - payment_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    env_file:
      - ./src/.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - payment_net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  payment_api:
    profiles: ["disabled"]
    build:
      context: ./src/
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ./src/.env
    networks:
      - payment_net
    depends_on:
      - payment_db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  payment_consumer:
    profiles: ["disabled"]
    build:
      context: ./src
      dockerfile: Dockerfile.consumer
    env_file:
      - ./src/.env
    networks:
      - payment_net
    depends_on:
      - rabbitmq
      - payment_db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  rabbitmq_data: